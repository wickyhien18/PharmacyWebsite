spring.application.name=Pharmacy
server.port=${PORT:8080}
java.runtime.version=17

#MySQL
spring.datasource.url=${PGURL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_batch_fetch_size=20
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.main.lazy-initialization=true
# Chỉ scan entity cần thiết
spring.jpa.properties.hibernate.archive.autodetection=class
# Bỏ nếu không dùng cache
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
# Force UTF-8
spring.datasource.hikari.connection-init-sql=SET client_encoding TO 'UTF8'


#Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/v3/api-docs
springdoc.packages-to-scan=Pharmacy.Controllers
spring.jackson.default-property-inclusion=non_null
spring.mvc.contentnegotiation.favor-parameter=false
spring.mvc.contentnegotiation.favor-path-extension=false

#JWT config
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration.access=3600000

# VNPay sandbox
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.tmn-code=YOUR_TMN_CODE
vnpay.hash-secret=YOUR_HASH_SECRET
vnpay.return-url=http://localhost:8080/api/payment/vnpay-return

# Connection pool — tăng lên cho production
spring.datasource.hikari.maximum-pool-size=6
spring.datasource.hikari.minimum-idle=2

# UTF-8 RESPONSE
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.threads.max=20
