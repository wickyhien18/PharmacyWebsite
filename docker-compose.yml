version: '3.8'

services:

  # ----------------------------------------------------------------
  # MySQL
  # ----------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: pharmacy_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE:      pharmacy_db
      MYSQL_USER:          ${DB_USERNAME:-pharmacy_user}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-pharmacy_pass}
    ports:
      - "3307:3306"   # 3307 ngoài → 3306 trong, tránh xung đột MySQL local
    volumes:
      - pharmacy_data:/var/lib/mysql
    healthcheck:
      # Dùng mysql client thay vì mysqladmin ping
      # mysqladmin ping pass quá sớm, mysql client mới chắc chắn DB sẵn sàng
      test: ["CMD", "mysql", "-u", "root",
             "-p${DB_ROOT_PASSWORD:-rootpass}",
             "-e", "SELECT 1", "pharmacy_db"]
      interval: 10s     # Kiểm tra mỗi 10 giây
      timeout:  5s      # Timeout mỗi lần kiểm tra
      retries:  10      # Thử tối đa 10 lần (= 100 giây chờ MySQL)
      start_period: 30s # Không tính fail trong 30s đầu (MySQL đang init)
    networks:
      - pharmacy_net

  # ----------------------------------------------------------------
  # Spring Boot App
  # ----------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharmacy_app
    depends_on:
      db:
        condition: service_healthy  # Chờ DB healthy THẬT SỰ mới khởi động
    environment:
      # Database — trỏ vào service "db" thay vì localhost
      SPRING_DATASOURCE_URL: >-
        jdbc:mysql://db:3306/pharmacy_db
        ?useSSL=false
        &serverTimezone=Asia/Ho_Chi_Minh
        &allowPublicKeyRetrieval=true
        &createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-pharmacy_user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-pharmacy_pass}

      # JPA
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"

      # JWT
      APP_JWT_SECRET:                  ${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBKV1Qgc2lnbmluZw==}
      APP_JWT_ACCESS_TOKEN_EXPIRY_MS:  3600000

      # VNPay
      VNPAY_TMN_CODE:    ${VNPAY_TMN_CODE:-DEMO}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-DEMO}
      VNPAY_RETURN_URL:  ${VNPAY_RETURN_URL:-http://localhost:8080/api/payment/vnpay-return}

    ports:
      - "8080:8080"
    healthcheck:
      # Kiểm tra Spring Boot đã sẵn sàng chưa bằng actuator health
      # Nếu chưa có actuator thì dùng /api/categories (public endpoint)
      test: ["CMD-SHELL",
             "wget -qO- http://localhost:8080/api/categories || exit 1"]
      interval: 15s
      timeout:  10s
      retries:  5
      start_period: 60s  # Spring Boot cần ~20-40s để start
    networks:
      - pharmacy_net
    restart: on-failure:3   # Tự restart tối đa 3 lần nếu crash

volumes:
  pharmacy_data:
    driver: local

networks:
  pharmacy_net:
    driver: bridge
